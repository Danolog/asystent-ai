openapi: 3.1.0

# ============================================================
# Asystent Osobisty AI — API Specification
# Interface Contract — single source of truth
# Generated by: Agent 4A (Tech Foundation)
# Used by: Agent 4B (Dev), Agent 5B (Audit), Agent 6 (DevOps)
#
# RULE: Agent 4B implements to this spec.
# Any deviation requires an ADR entry in decisions_log.md.
# ============================================================

info:
  title: Asystent Osobisty AI — API
  version: 0.1.0
  description: |
    Personal AI assistant REST API.
    Auth via better-auth (session cookie). Passkey (WebAuthn) endpoints managed by better-auth plugin.

servers:
  - url: http://localhost:3000
    description: Development
  - url: https://asystent-ai.vercel.app
    description: Production

security:
  - sessionCookie: []

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: better-auth.session_token

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - NOT_FOUND
                - RATE_LIMITED
                - FILE_TOO_LARGE
                - UNSUPPORTED_FILE_TYPE
                - PROCESSING_ERROR
                - AI_ERROR
                - SEARCH_ERROR
                - NOTIFICATION_ERROR
                - INTERNAL_ERROR
            message:
              type: string
            details:
              type: object

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        email: { type: string, format: email }
        emailVerified: { type: boolean }
        image: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        role: { type: string, enum: [admin, user] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ConversationListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        updatedAt: { type: string, format: date-time }
        lastMessagePreview: { type: string, nullable: true }

    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        conversationId: { type: string, format: uuid }
        role: { type: string, enum: [user, assistant, system] }
        content: { type: string }
        sourceType: { type: string, nullable: true, enum: [rag, web, ai, memory, tool] }
        sourceMetadata: { type: object, nullable: true }
        tokenCount: { type: integer, nullable: true }
        createdAt: { type: string, format: date-time }

    DocumentListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        mimeType: { type: string }
        sizeBytes: { type: integer }
        status: { type: string, enum: [processing, ready, error] }
        chunkCount: { type: integer }
        createdAt: { type: string, format: date-time }

    MemoryListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        content: { type: string }
        category: { type: string, enum: [preference, fact, context, general] }
        createdAt: { type: string, format: date-time }

    NotificationListItem:
      type: object
      properties:
        id: { type: string, format: uuid }
        content: { type: string }
        scheduledAt: { type: string, format: date-time }
        recurrence: { type: string, enum: [once, daily, weekly, monthly] }
        isActive: { type: boolean }
        nextSendAt: { type: string, format: date-time, nullable: true }

paths:
  # ---- AUTH (managed by better-auth) -------------------------
  /api/auth/{path}:
    get:
      summary: Auth endpoints (better-auth catch-all)
      tags: [Auth]
      parameters:
        - name: path
          in: path
          required: true
          schema: { type: string }
      responses:
        200: { description: Auth response }
    post:
      summary: Auth endpoints (better-auth catch-all)
      tags: [Auth]
      parameters:
        - name: path
          in: path
          required: true
          schema: { type: string }
      responses:
        200: { description: Auth response }

  # ---- CHAT --------------------------------------------------
  /api/chat:
    post:
      summary: Send message and get streaming AI response
      tags: [Chat]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversationId, content]
              properties:
                conversationId: { type: string, format: uuid }
                content: { type: string }
      responses:
        200:
          description: Streaming text response (text/event-stream)
        401:
          description: Unauthorized
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  # ---- CONVERSATIONS -----------------------------------------
  /api/conversations:
    get:
      summary: List user conversations
      tags: [Conversations]
      responses:
        200:
          description: Array of conversations
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ConversationListItem' }
    post:
      summary: Create new conversation
      tags: [Conversations]
      responses:
        200:
          description: Created conversation
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationListItem' }

  /api/conversations/{id}:
    get:
      summary: Get conversation with messages
      tags: [Conversations]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200:
          description: Conversation with messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversation: { $ref: '#/components/schemas/ConversationListItem' }
                  messages:
                    type: array
                    items: { $ref: '#/components/schemas/Message' }
    delete:
      summary: Delete conversation
      tags: [Conversations]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200: { description: Deleted }

  # ---- DOCUMENTS (RAG) ---------------------------------------
  /api/documents:
    get:
      summary: List user documents
      tags: [Documents]
      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/DocumentListItem' }
    post:
      summary: Upload and process document
      tags: [Documents]
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        200:
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DocumentListItem' }

  /api/documents/{id}:
    delete:
      summary: Delete document
      tags: [Documents]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200: { description: Deleted }

  # ---- MEMORY ------------------------------------------------
  /api/memory:
    get:
      summary: List user memories
      tags: [Memory]
      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MemoryListItem' }

  /api/memory/{id}:
    delete:
      summary: Delete specific memory
      tags: [Memory]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200: { description: Deleted }

  # ---- NOTIFICATIONS -----------------------------------------
  /api/notifications:
    get:
      summary: List user notifications
      tags: [Notifications]
      responses:
        200:
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/NotificationListItem' }
    post:
      summary: Create notification
      tags: [Notifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content, scheduledAt]
              properties:
                content: { type: string }
                scheduledAt: { type: string, format: date-time }
                recurrence: { type: string, enum: [once, daily, weekly, monthly] }
      responses:
        200:
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationListItem' }

  /api/notifications/{id}:
    put:
      summary: Update notification
      tags: [Notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                content: { type: string }
                scheduledAt: { type: string, format: date-time }
                recurrence: { type: string, enum: [once, daily, weekly, monthly] }
                isActive: { type: boolean }
      responses:
        200:
          content:
            application/json:
              schema: { $ref: '#/components/schemas/NotificationListItem' }
    delete:
      summary: Delete notification
      tags: [Notifications]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        200: { description: Deleted }

  # ---- SEARCH ------------------------------------------------
  /api/search:
    post:
      summary: Web search via Tavily API
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
      responses:
        200:
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        title: { type: string }
                        url: { type: string }
                        content: { type: string }

  # ---- USER PROFILE ------------------------------------------
  /api/user/profile:
    get:
      summary: Get current user profile
      tags: [User]
      responses:
        200:
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
    put:
      summary: Update user profile
      tags: [User]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
      responses:
        200:
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  # ---- HEALTH ------------------------------------------------
  /api/health:
    get:
      summary: Health check (with DB status)
      tags: [System]
      security: []
      responses:
        200:
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  database: { type: string }

  # ---- CRON --------------------------------------------------
  /api/cron/notifications:
    get:
      summary: Process due notifications (cron job)
      tags: [System]
      security: []
      parameters:
        - name: authorization
          in: header
          required: true
          schema: { type: string }
          description: "Bearer {CRON_SECRET}"
      responses:
        200:
          description: Notifications processed
